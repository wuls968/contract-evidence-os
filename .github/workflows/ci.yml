name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Check API snapshot drift
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from contract_evidence_os.api.contracts import operator_api_contract
          snapshot = json.loads(Path("docs/api/operator-v1.snapshot.json").read_text(encoding="utf-8"))
          assert snapshot == operator_api_contract()
          PY
      - name: Check CLI help snapshot drift
        run: |
          python - <<'PY'
          from pathlib import Path
          from contract_evidence_os.api.cli import build_parser as build_ceos_parser
          from contract_evidence_os.api.maintenance_main import build_parser as build_maintenance_parser
          assert Path("docs/cli/ceos-help.snapshot.txt").read_text(encoding="utf-8") == build_ceos_parser().format_help()
          assert Path("docs/cli/ceos-maintenance-help.snapshot.txt").read_text(encoding="utf-8") == build_maintenance_parser().format_help()
          PY
      - name: Check release assets
        run: |
          test -f CHANGELOG.md
          test -f docs/releases/0.9.0.md
          test -f docs/releases/migration-0.9.0.md
      - name: Packaging smoke test
        run: |
          python -m build --sdist --wheel
          ls dist/*.tar.gz dist/*.whl
          python -m venv /tmp/ceos-wheel-check
          /tmp/ceos-wheel-check/bin/pip install --upgrade pip
          /tmp/ceos-wheel-check/bin/pip install dist/*.whl
          /tmp/ceos-wheel-check/bin/python - <<'PY'
          from pathlib import Path
          import contract_evidence_os
          from contract_evidence_os.api.cli import build_parser as build_ceos_parser
          from contract_evidence_os.runtime.service import RuntimeService
          print("wheel-import-ok", contract_evidence_os.__file__)
          print("wheel-cli-help-ok", build_ceos_parser().prog)
          runtime = RuntimeService(storage_root=Path("/tmp/ceos-wheel-runtime"))
          print("wheel-runtime-ok", type(runtime.repository).__name__)
          PY
      - name: Run tests with coverage
        run: |
          pytest --cov=src/contract_evidence_os --cov-report=term-missing --cov-fail-under=80
